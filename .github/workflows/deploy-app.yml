name: Deploy GTM Wizard app to Pages

# Builds app/ (which regenerates data from knowledge-base/) and publishes to GitHub Pages.
# Enable once: repo Settings → Pages → Source: GitHub Actions. Site serves at /gtm-lab/ (matches vite base).

on:
  push:
    branches: [main]
    paths: ['app/**', 'knowledge-base/**', '.github/workflows/deploy-app.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
